{% extends "web/base.html" %}
{% block title %}Login{% endblock %}

{% block full_page %}
<div class="min-h-screen bg-navy-950 flex items-center justify-center p-4" x-data="{
       username: '',
       password: '',
       error: '',
       loading: false,
       async submit() {
         if (!this.username || !this.password) return;
         this.loading = true; this.error = '';
         try {
           const res = await fetch('/api/auth/login/', {
             method: 'POST',
             headers: {'Content-Type':'application/json', 'X-CSRFToken': '{{ csrf_token }}'},
             body: JSON.stringify({username: this.username, password: this.password})
           });
           const data = await res.json();
           if (res.ok) {
             sessionStorage.setItem('tw_token', data.token);
             window.location.href = '/';
           } else {
             this.error = 'Credenciales inválidas';
           }
         } catch { this.error = 'Error de conexión'; }
         this.loading = false;
       }
     }">
    <div class="w-full max-w-sm">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div
                class="w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-500 to-cyan-500 flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-500/20">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="none" viewBox="0 0 24 24"
                    stroke="white" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                </svg>
            </div>
            <h1
                class="text-2xl font-extrabold bg-gradient-to-r from-blue-400 to-cyan-400 bg-clip-text text-transparent">
                TireWatch</h1>
            <p class="text-xs text-gray-500 tracking-[3px] uppercase mt-1">STI — Control de Desgaste</p>
        </div>

        <!-- Form -->
        <div class="bg-navy-800 border border-navy-700 rounded-xl p-6">
            <div x-show="error" x-cloak
                class="mb-4 p-3 bg-red-900/30 border border-red-800 rounded-lg text-red-400 text-xs font-medium"
                x-text="error"></div>

            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] text-gray-500 uppercase tracking-wider mb-1.5">Usuario</label>
                    <input type="text" x-model="username" @keydown.enter="submit"
                        class="w-full bg-navy-950 border border-navy-700 rounded-lg px-3 py-2.5 text-sm text-gray-200 focus:border-blue-500 focus:outline-none transition-colors"
                        placeholder="usuario" autocomplete="username" />
                </div>
                <div>
                    <label class="block text-[10px] text-gray-500 uppercase tracking-wider mb-1.5">Contraseña</label>
                    <input type="password" x-model="password" @keydown.enter="submit"
                        class="w-full bg-navy-950 border border-navy-700 rounded-lg px-3 py-2.5 text-sm text-gray-200 focus:border-blue-500 focus:outline-none transition-colors"
                        placeholder="••••••••" autocomplete="current-password" />
                </div>
                <button @click="submit" :disabled="loading || !username || !password"
                    class="w-full bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-500 hover:to-blue-600 text-white font-bold py-2.5 rounded-lg text-sm flex items-center justify-center gap-2 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
                    </svg>
                    <span x-text="loading ? 'Ingresando...' : 'Ingresar'"></span>
                </button>
            </div>
        </div>

        <p class="text-center text-[10px] text-gray-600 mt-4">San Antonio Terminal Internacional — HGT</p>
    </div>
</div>
{% endblock %}
